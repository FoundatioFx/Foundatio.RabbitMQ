# RabbitMQ configuration for chaos testing node 3 (Aspire-managed)
# Least constrained: 100MB disk, 400MB memory watermark

vm_memory_high_watermark.absolute = 400MB
disk_free_limit.absolute = 10MB

# Cluster formation - auto-join peers
cluster_formation.peer_discovery_backend = classic_config
cluster_formation.classic_config.nodes.1 = rabbit@chaos-1
cluster_formation.classic_config.nodes.2 = rabbit@chaos-2
cluster_formation.classic_config.nodes.3 = rabbit@chaos-3
